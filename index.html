<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AstroCalc Delta</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#05070f;--bg2:#0a0e1a;--bg3:#0f1525;--border:#1c2640;--border2:#2a3a5c;--text:#c8d8f8;--dim:#5a6f99;--mute:#2e3f66;--accent:#3a7fff;--accent2:#00cfff;--green:#2affa0;--orange:#ff8c3a;--purple:#b06bff;--red:#ff4a6e;--yellow:#ffd93a;--glow:0 0 20px rgba(58,127,255,0.25);--glow-sm:0 0 8px rgba(58,127,255,0.3);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    #starfield{position:fixed;inset:0;z-index:0;pointer-events:none}
    .shell{position:relative;z-index:1;display:grid;grid-template-columns:280px 1fr;grid-template-rows:auto 1fr;min-height:100vh}
    header{grid-column:1/-1;padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(5,7,15,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
    .logo{display:flex;align-items:center;gap:12px;text-decoration:none}
    .logo-mark{width:32px;height:32px;border:2px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:var(--glow-sm)}
    .logo-mark::before{content:'';width:8px;height:8px;background:var(--accent2);border-radius:50%;box-shadow:0 0 6px var(--accent2)}
    .logo-mark::after{content:'';position:absolute;width:22px;height:22px;border:1px solid rgba(58,127,255,0.4);border-radius:50%;animation:orbit 3s linear infinite}
    @keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .logo-text{font-weight:800;font-size:1.1rem;letter-spacing:0.08em}
    .logo-text span{color:var(--accent2)}
    .hstatus{display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--dim)}
    .sdot{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 6px var(--green);animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    aside{grid-row:2;border-right:1px solid var(--border);background:rgba(10,14,26,0.6);overflow-y:auto;padding:1.5rem 0}
    .ss{padding:0 1.25rem 1.25rem}.sw{position:relative}
    .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:0.75rem}
    #search{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px 8px 30px;font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--text);outline:none;transition:border-color 0.2s}
    #search:focus{border-color:var(--accent)}
    #search::placeholder{color:var(--mute)}
    .dg{margin-bottom:0.5rem}
    .dl{padding:6px 1.25rem;font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--mute);display:flex;align-items:center;gap:8px}
    .dl::after{content:'';flex:1;height:1px;background:var(--border)}
    .fb{width:100%;background:none;border:none;padding:8px 1.25rem;text-align:left;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background 0.15s;color:var(--dim);font-family:'Syne',sans-serif;font-size:0.8rem}
    .fb:hover{background:rgba(58,127,255,0.06);color:var(--text)}
    .fb.active{background:rgba(58,127,255,0.12);color:var(--accent2)}
    .fd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    main{grid-row:2;padding:2rem;overflow-y:auto;display:flex;flex-direction:column;gap:1.5rem}
    .hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:1.5rem;padding:4rem 2rem}
    .hero-title{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;line-height:1.1;background:linear-gradient(135deg,#fff 30%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-sub{font-family:'Space Mono',monospace;font-size:0.8rem;color:var(--dim);max-width:520px;line-height:1.7}
    .dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;width:100%;max-width:720px;margin-top:1rem}
    .dc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;gap:6px}
    .dc:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-2px);box-shadow:var(--glow)}
    .dci{font-size:1.5rem}.dcl{font-size:0.75rem;font-weight:700;letter-spacing:0.05em}.dcc{font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--dim)}
    .cp{display:none;flex-direction:column;gap:1.5rem}.cp.visible{display:flex}
    .ph{display:flex;flex-direction:column;gap:6px}
    .pbadge{font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;padding:3px 8px;border-radius:4px;display:inline-flex;align-items:center;gap:6px;width:fit-content}
    .ptitle{font-size:1.6rem;font-weight:800;line-height:1.2}
    .eqdis{font-family:'Space Mono',monospace;font-size:0.9rem;color:var(--accent2);padding:10px 16px;background:rgba(0,207,255,0.05);border:1px solid rgba(0,207,255,0.15);border-radius:8px;letter-spacing:0.04em;width:fit-content}
    .ig{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem}
    .igrp{display:flex;flex-direction:column;gap:6px}
    .ilbl{font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);display:flex;justify-content:space-between}
    .iunit{color:var(--accent);font-size:0.6rem}
    .pi{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-family:'Space Mono',monospace;font-size:0.85rem;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;width:100%}
    .pi:focus{border-color:var(--accent);box-shadow:var(--glow-sm)}
    .cbtn{padding:12px 32px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:0.06em;cursor:pointer;transition:all 0.2s;align-self:flex-start;position:relative;overflow:hidden}
    .cbtn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 60%)}
    .cbtn:hover{background:#5590ff;transform:translateY(-1px);box-shadow:0 4px 20px rgba(58,127,255,0.5)}.cbtn.loading{opacity:0.7;cursor:wait}
    .rp{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .rh{padding:10px 16px;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--mute);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
    .rb{padding:1rem}
    .rr{display:flex;justify-content:space-between;align-items:baseline;padding:10px 12px;border-radius:6px;gap:2rem;animation:slideIn 0.3s ease both}
    .rr:nth-child(even){background:rgba(255,255,255,0.02)}
    @keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
    .rk{font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--dim);flex-shrink:0}
    .rv{font-family:'Space Mono',monospace;font-size:0.9rem;font-weight:700;color:var(--green);text-align:right}
    .errmsg{font-family:'Space Mono',monospace;font-size:0.8rem;color:var(--red);padding:1rem}
    .const-panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .const-hdr{padding:10px 16px;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--mute)}
    .const-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));padding:1rem;gap:0.5rem}
    .crow{display:flex;justify-content:space-between;gap:1rem;padding:6px 10px;border-radius:4px}
    .crow:hover{background:rgba(255,255,255,0.03)}
    .cn{font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--dim)}
    .cv{font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--accent2);text-align:right;flex-shrink:0}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
    .hidden{display:none!important}
    .fade-in{animation:fadeIn 0.4s ease both}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="shell">
  <header>
    <a class="logo" href="#"><div class="logo-mark"></div><span class="logo-text">Astro<span>Calc</span> Δ</span></a>
    <div class="hstatus"><div class="sdot"></div><span id="status-text">INITIALISING...</span></div>
  </header>
  <aside>
    <div class="ss"><div class="sw"><span class="si">⌕</span><input id="search" type="text" placeholder="Search formulas..." autocomplete="off"/></div></div>
    <div id="formula-list"></div>
  </aside>
  <main>
    <section class="hero fade-in" id="hero">
      <div class="hero-title">Mission Control<br/>for the Cosmos</div>
      <p class="hero-sub">A unified physics calculator spanning orbital mechanics, rocket propulsion, planetary science, relativity, electromagnetism, and quantum physics.</p>
      <div class="dgrid" id="domain-grid"></div>
    </section>
    <section class="cp" id="calc-panel">
      <div class="ph">
        <div class="pbadge" id="panel-badge"></div>
        <div class="ptitle" id="panel-title"></div>
        <div class="eqdis" id="panel-eq"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:1rem;padding-top:1rem">
        <div class="ig" id="input-grid"></div>
        <button class="cbtn" id="calc-btn">▶ CALCULATE</button>
        <div class="rp hidden" id="results-panel">
          <div class="rh">
            <span>OUTPUT</span>
            <span id="calc-meta"></span>
          </div>
          <div class="rb" id="results-body"></div>
        </div>
      </div>
    </section>
    <div class="const-panel fade-in">
      <div class="const-hdr">Physical Constants</div>
      <div class="const-grid" id="const-grid"><div style="padding:1rem;font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--mute)">Loading...</div></div>
    </div>
  </main>
</div>
<script>
// STARFIELD
(function(){const c=document.getElementById('starfield'),ctx=c.getContext('2d');let W,H,stars=[];function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}function init(n=200){stars=Array.from({length:n},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.2,a:Math.random(),da:(Math.random()-0.5)*0.005}));}function draw(){ctx.clearRect(0,0,W,H);stars.forEach(s=>{s.a=Math.max(0.05,Math.min(1,s.a+s.da));if(s.a<=0.05||s.a>=1)s.da*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,210,255,${s.a})`;ctx.fill();});requestAnimationFrame(draw);}resize();init();draw();window.addEventListener('resize',()=>{resize();init();});})();

const DOMAIN_META={
  orbital:   {label:'Orbital Mechanics',      icon:'🪐',color:'#3a7fff'},
  propulsion:{label:'Rocket Propulsion',       icon:'🚀',color:'#ff8c3a'},
  planetary: {label:'Planetary Science',       icon:'🌍',color:'#2affa0'},
  relativity:{label:'Relativity & Black Holes',icon:'⚫',color:'#b06bff'},
  quantum:   {label:'Quantum Mechanics',       icon:'⚛️',color:'#ffd93a'},
  em:        {label:'Electromagnetism',         icon:'⚡',color:'#00cfff'},
};

let formulaData={},activeKey=null;

async function init(){
  try{
    const[fRes,cRes]=await Promise.all([fetch('/api/formulas'),fetch('/api/constants')]);
    formulaData=await fRes.json();const constants=await cRes.json();
    document.getElementById('status-text').textContent='ALL SYSTEMS NOMINAL';
    buildSidebar();buildDomainGrid();buildConstants(constants);
  }catch(e){document.getElementById('status-text').textContent='SERVER OFFLINE';}
}

function buildSidebar(){
  const container=document.getElementById('formula-list');container.innerHTML='';
  const grouped={};
  for(const[key,f]of Object.entries(formulaData))(grouped[f.domain]=grouped[f.domain]||{})[key]=f;
  for(const[domain,meta]of Object.entries(DOMAIN_META)){
    if(!grouped[domain])continue;
    const grp=document.createElement('div');grp.className='dg';grp.dataset.domain=domain;
    const lbl=document.createElement('div');lbl.className='dl';lbl.textContent=meta.label;grp.appendChild(lbl);
    for(const[key,f]of Object.entries(grouped[domain])){
      const btn=document.createElement('button');btn.className='fb';btn.dataset.key=key;
      const dot=document.createElement('div');dot.className='fd';dot.style.background=meta.color;
      btn.appendChild(dot);btn.appendChild(document.createTextNode(f.label));
      btn.addEventListener('click',()=>selectFormula(key));
      grp.appendChild(btn);
    }
    container.appendChild(grp);
  }
}

function buildDomainGrid(){
  const grid=document.getElementById('domain-grid');
  const counts={};for(const f of Object.values(formulaData))counts[f.domain]=(counts[f.domain]||0)+1;
  for(const[domain,meta]of Object.entries(DOMAIN_META)){
    const card=document.createElement('div');card.className='dc';
    card.innerHTML=`<div class="dci">${meta.icon}</div><div class="dcl" style="color:${meta.color}">${meta.label}</div><div class="dcc">${counts[domain]||0} formulas</div>`;
    card.addEventListener('click',()=>{const first=Object.entries(formulaData).find(([,f])=>f.domain===domain);if(first)selectFormula(first[0]);});
    grid.appendChild(card);
  }
}

function buildConstants(data){
  const grid=document.getElementById('const-grid');grid.innerHTML='';
  for(const[name,val]of Object.entries(data)){
    const row=document.createElement('div');row.className='crow';
    row.innerHTML=`<span class="cn">${name}</span><span class="cv">${val}</span>`;
    grid.appendChild(row);
  }
}

function selectFormula(key){
  activeKey=key;
  const f=formulaData[key],meta=DOMAIN_META[f.domain];
  document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('active',b.dataset.key===key));
  document.getElementById('hero').classList.add('hidden');
  document.getElementById('calc-panel').classList.add('visible');
  const badge=document.getElementById('panel-badge');
  badge.textContent=meta.label;badge.style.background=meta.color+'22';badge.style.color=meta.color;badge.style.border=`1px solid ${meta.color}44`;
  document.getElementById('panel-title').textContent=f.label;
  document.getElementById('panel-eq').textContent=f.equation;
  const grid=document.getElementById('input-grid');grid.innerHTML='';
  f.params.forEach(p=>{
    const g=document.createElement('div');g.className='igrp';
    g.innerHTML=`<label class="ilbl">${p.label}${p.unit?`<span class="iunit">${p.unit}</span>`:''}</label><input class="pi" type="number" data-id="${p.id}" value="${p.default}" step="any"/>`;
    grid.appendChild(g);
  });
  document.getElementById('results-panel').classList.add('hidden');
}

document.getElementById('calc-btn').addEventListener('click',async()=>{
  if(!activeKey)return;
  const btn=document.getElementById('calc-btn');
  btn.classList.add('loading');btn.textContent='⏳ COMPUTING...';
  const params={};
  document.querySelectorAll('.pi').forEach(inp=>{params[inp.dataset.id]=inp.value;});
  try{
    const res=await fetch('/api/calculate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({formula:activeKey,params})});
    const data=await res.json();
    document.getElementById('results-panel').classList.remove('hidden');
    // Meta line: iterations + stability
    const iters=(data.iterations||1).toLocaleString();
    const ms=data.elapsed_ms||'—';
    const stable=data.any_drift===false;
    const stableTag=stable
      ?`<span style="color:var(--green)">✓ STABLE</span>`
      :`<span style="color:var(--orange)">⚠ DRIFT</span>`;
    document.getElementById('calc-meta').innerHTML=
      `<span style="color:var(--dim)">${iters} runs · ${ms}ms</span>&nbsp;&nbsp;${stableTag}`;
    const body=document.getElementById('results-body');
    if(data.ok){
      body.innerHTML='';
      for(const[k,v]of Object.entries(data.results)){
        const prec=data.precision&&data.precision[k];
        const note=prec
          ?(prec.stable
            ?`<span style="font-size:0.58rem;color:var(--mute);margin-left:6px">avg identical</span>`
            :`<span style="font-size:0.58rem;color:var(--orange);margin-left:6px">drift ${prec.drift.toExponential(1)}</span>`)
          :'';
        const row=document.createElement('div');row.className='rr';
        row.innerHTML=`<span class="rk">${k}</span><span class="rv">${v}${note}</span>`;
        body.appendChild(row);
      }
    }else{
      body.innerHTML=`<div class="errmsg">⚠ ${data.error}</div>`;
    }
  }catch(e){
    document.getElementById('results-panel').classList.remove('hidden');
    document.getElementById('results-body').innerHTML=`<div class="errmsg">⚠ ${e.message}</div>`;
  }
  btn.classList.remove('loading');btn.textContent='▶ CALCULATE';
});

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&activeKey)document.getElementById('calc-btn').click();
});

document.getElementById('search').addEventListener('input',function(){
  const q=this.value.toLowerCase();
  document.querySelectorAll('.fb').forEach(btn=>btn.style.display=btn.textContent.toLowerCase().includes(q)?'':'none');
  document.querySelectorAll('.dg').forEach(grp=>{
    const any=[...grp.querySelectorAll('.fb')].some(b=>b.style.display!=='none');
    grp.style.display=any?'':'none';
  });
});

init();
</script>
</body>
</html>
